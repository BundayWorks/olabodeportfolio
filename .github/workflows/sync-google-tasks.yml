name: Sync Google Tasks

on:
  schedule:
    # Every 15 minutes. GitHub may delay scheduled jobs by a few minutes
    # under load — that's normal and harmless for a sync job.
    - cron: '*/15 * * * *'
  # Lets us trigger a sync manually from the Actions tab too.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit sync endpoint
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SYNC_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::SYNC_URL or CRON_SECRET secret is not set"
            exit 1
          fi
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 60 \
            --write-out '\nHTTP_STATUS:%{http_code}\n' \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SYNC_URL")
          echo "$response"
